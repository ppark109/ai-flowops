name: default-commercial-intake-playbook
version: "1.0.0"
approval_policy: on_high_risk
rules:
  - id: clean_standard_package
    description: Allow fully complete, low-risk commercial packages to auto-approve.
    when:
      contains_all:
        - "standard"
        - "complete"
    severity: low
    route: auto_approve
    approval_required: false
    required_evidence:
      - intake_span
      - contract_span
    task_template: Generate standard onboarding package for commercial operations.

  - id: liability_cap_above_standard
    description: Liability cap exceeds standard commercial threshold.
    when:
      contains_any:
        - "liability cap"
        - "above 1x"
        - "liability above"
    severity: high
    route: legal
    approval_required: true
    required_evidence:
      - contract_span
    task_template: Route to legal for liability cap exception review.

  - id: nonstandard_indemnity
    description: Nonstandard indemnity clause requires legal review.
    when:
      contains_any:
        - "nonstandard indemnity"
        - "broader indemnity"
        - "indemnity above"
    severity: high
    route: legal
    approval_required: true
    required_evidence:
      - contract_span
    task_template: Route to legal for indemnity language exception.

  - id: missing_dpa_for_regulated_data
    description: Missing DPA where data processing is regulated or sensitive.
    when:
      required_signals:
        - "missing_dpa_for_regulated_data"
    severity: high
    route: security
    approval_required: true
    required_evidence:
      - questionnaire_span
      - contract_span
    task_template: Request a signed DPA before approval.

  - id: data_residency_request
    description: Explicit data-residency request needs security review.
    when:
      contains_any:
        - "data residency"
        - "residency request"
    severity: medium
    route: security
    approval_required: true
    required_evidence:
      - contract_span
    task_template: Validate legal and security policy for residency.

  - id: regulated_data_without_security_artifact
    description: Regulated data references without complete security artifacts.
    when:
      contains_any:
        - "regulated data"
      required_signals:
        - "regulated_data_without_security_artifact"
    severity: high
    route: security
    approval_required: true
    required_evidence:
      - questionnaire_span
    task_template: Confirm data classification and required security exceptions.

  - id: aggressive_go_live_date
    description: Unusually fast implementation schedule increases delivery risk.
    when:
      contains_any:
        - "aggressive"
        - "next week"
        - "7 days"
        - "two days"
        - "48"
    severity: medium
    route: implementation
    approval_required: true
    required_evidence:
      - notes_span
    task_template: Validate timeline feasibility and resourcing.

  - id: unsupported_integration
    description: Requested unsupported integration must be reviewed by implementation.
    when:
      contains_any:
        - "custom sap plugin"
        - "legacy mainframe connector"
        - "unsupported integration"
        - "custom connector"
    severity: medium
    route: implementation
    approval_required: true
    required_evidence:
      - notes_span
    task_template: Review integration feasibility and implementation plan.

  - id: unclear_customer_owner
    description: Missing or unclear customer owner slows implementation planning.
    when:
      contains_any:
        - "unclear owner"
        - "no owner"
        - "owner to be determined"
    severity: medium
    route: implementation
    approval_required: true
    required_evidence:
      - notes_span
    task_template: Obtain clear internal customer owner before kickoff.

  - id: missing_sow
    description: Missing statement of work/reference requires implementation triage.
    when:
      required_signals:
        - "missing_sow"
    severity: medium
    route: implementation
    approval_required: true
    required_evidence:
      - notes_span
    task_template: Pause until missing statement of work is supplied.

  - id: discount_above_threshold
    description: Discount above internal threshold requires finance approval.
    when:
      contains_any:
        - "45%"
        - "50%"
        - "above 40%"
        - "deep discount"
    severity: medium
    route: finance
    approval_required: true
    required_evidence:
      - order_form_span
    task_template: Review pricing exception and approver matrix.

  - id: custom_sla_credits
    description: Custom SLA credits or penalties require finance review.
    when:
      contains_any:
        - "sla credits"
        - "custom credit"
        - "unusual credit"
    severity: medium
    route: finance
    approval_required: true
    required_evidence:
      - order_form_span
    task_template: Validate credit terms and downside protection.

  - id: unusual_penalty_terms
    description: Non-standard penalty terms need finance review.
    when:
      contains_any:
        - "unusual penalty"
        - "penalty"
        - "termination penalty"
    severity: medium
    route: finance
    approval_required: true
    required_evidence:
      - contract_span
    task_template: Check unusual penalty exposure before execution.

  - id: incomplete_intake_package
    description: Incomplete intake information requires reviewer follow-up.
    when:
      required_signals:
        - "incomplete_intake_package"
    severity: medium
    route: implementation
    approval_required: true
    required_evidence:
      - intake_span
    task_template: Request missing intake details and defer approval.
